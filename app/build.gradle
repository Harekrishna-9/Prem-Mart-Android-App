plugins {
    id 'com.android.application'
}

android {
    namespace 'com.premmart.store'
    compileSdk 35

    defaultConfig {
        applicationId "com.premmart.store"
        minSdk 23
        targetSdk 35
        versionCode 1
        versionName "1.0-trial"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}
